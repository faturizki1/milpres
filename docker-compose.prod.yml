version: '3.8'
services:
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      - PORT=3001
      - DATABASE_URL
      - REDIS_URL
      - MINIO_ENDPOINT
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  content-service:
    build:
      context: ./services/content-service
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      - PORT=3002
      - DATABASE_URL
      - REDIS_URL
      - MINIO_ENDPOINT
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      - PORT=3003
      - NEXT_PUBLIC_API_BASE
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/_next/static || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  public-site:
    build:
      context: ./apps/public-site
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      - PORT=3004
      - NEXT_PUBLIC_API_BASE
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/_next/static || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      - DATABASE_URL
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep 6432 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:stable
    depends_on:
      - auth-service
      - content-service
      - admin-dashboard
      - public-site
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot
    command: ["certonly", "--webroot", "-w", "/var/www/certbot", "--email", "${LETSENCRYPT_EMAIL}", "--agree-tos", "-d", "${DOMAIN}"]
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/www:/var/www/certbot
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  miniodata:
  certbot-etc:
  certbot-var:

networks:
  internal:
    driver: bridge
